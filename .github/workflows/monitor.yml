name: NOL 票务监控

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 cloudscraper

      - name: Run monitor
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          KEYWORDS: ${{ vars.KEYWORDS }}
        run: python monitor.py

      - name: Save state to repo
        run: |
          git config user.name  "nol-monitor[bot]"
          git config user.email "nol-monitor@users.noreply.github.com"
          git add nol_state.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update state [skip ci]"
            git push
          fi
