name: NOL 票务监控

on:
  schedule:
    - cron: "*/5 * * * *"   # 每 5 分钟自动运行
  workflow_dispatch:          # 也可手动触发

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}      # Bark App 的 Key（必填）
          KEYWORDS: ${{ vars.KEYWORDS }}         # 关键词，逗号分隔（选填）
        run: python monitor.py

      - name: Save state to repo
        run: |
          git config user.name  "nol-monitor[bot]"
          git config user.email "nol-monitor@users.noreply.github.com"
          git add nol_state.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update state [skip ci]"
            git push
          fi
